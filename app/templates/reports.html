{% extends "base.html" %}
{% block title %}Reports — FlexTime Pro{% endblock %}
{% block page_title %}Reports{% endblock %}

{% block content %}
<div class="space-y-6 animate-fade-in max-w-2xl">

    <!-- Weekly Report -->
    <div class="card p-6 space-y-4">
        <h3 class="text-base font-semibold flex items-center gap-2">
            <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Weekly Report
        </h3>
        <div class="flex flex-wrap gap-3 items-end" x-data="{ year: {{ current_year }}, week: {{ current_week }} }">
            <div>
                <label class="text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 block">Year</label>
                <input type="number" x-model="year" class="input-field w-24 text-sm" min="2020" max="2050">
            </div>
            <div>
                <label class="text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 block">Week</label>
                <input type="number" x-model="week" class="input-field w-20 text-sm" min="1" max="53">
            </div>
            <div class="flex gap-2">
                <a :href="'/reports/export/weekly/csv?year=' + year + '&week=' + week" class="btn-secondary text-sm">CSV</a>
                <a :href="'/reports/export/weekly/excel?year=' + year + '&week=' + week" class="btn-secondary text-sm">Excel</a>
                <a :href="'/reports/export/weekly/pdf?year=' + year + '&week=' + week" class="btn-primary text-sm">PDF</a>
            </div>
        </div>
    </div>

    <!-- Monthly Report -->
    <div class="card p-6 space-y-4">
        <h3 class="text-base font-semibold flex items-center gap-2">
            <svg class="w-5 h-5 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            Monthly Report
        </h3>
        <div class="flex flex-wrap gap-3 items-end" x-data="{ year: {{ current_year }}, month: {{ current_month }} }">
            <div>
                <label class="text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 block">Year</label>
                <input type="number" x-model="year" class="input-field w-24 text-sm" min="2020" max="2050">
            </div>
            <div>
                <label class="text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 block">Month</label>
                <select x-model="month" class="input-field w-32 text-sm">
                    <option value="1">January</option><option value="2">February</option>
                    <option value="3">March</option><option value="4">April</option>
                    <option value="5">May</option><option value="6">June</option>
                    <option value="7">July</option><option value="8">August</option>
                    <option value="9">September</option><option value="10">October</option>
                    <option value="11">November</option><option value="12">December</option>
                </select>
            </div>
            <div class="flex gap-2">
                <a :href="'/reports/export/monthly/csv?year=' + year + '&month=' + month" class="btn-secondary text-sm">CSV</a>
                <a :href="'/reports/export/monthly/excel?year=' + year + '&month=' + month" class="btn-secondary text-sm">Excel</a>
                <a :href="'/reports/export/monthly/pdf?year=' + year + '&month=' + month" class="btn-primary text-sm">PDF</a>
            </div>
        </div>
    </div>

    <!-- Yearly Report -->
    <div class="card p-6 space-y-4">
        <h3 class="text-base font-semibold flex items-center gap-2">
            <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            Yearly Report
        </h3>
        <div class="flex flex-wrap gap-3 items-end" x-data="{ year: {{ current_year }} }">
            <div>
                <label class="text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 block">Year</label>
                <input type="number" x-model="year" class="input-field w-24 text-sm" min="2020" max="2050">
            </div>
            <div class="flex gap-2">
                <a :href="'/reports/export/yearly/csv?year=' + year" class="btn-secondary text-sm">CSV</a>
                <a :href="'/reports/export/yearly/excel?year=' + year" class="btn-secondary text-sm">Excel</a>
                <a :href="'/reports/export/yearly/pdf?year=' + year" class="btn-primary text-sm">PDF</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
